<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CS Unplugged Workbook{% endblock %}</title>

  <!-- Google Fonts: Fredoka (headings) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/colors.css">
  <link rel="stylesheet" href="../styles/typography.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/print.css">

  <style>
    /* Minimal reset so browsers start from the same place */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

  {% block content %}{% endblock %}

  {% block extra_scripts %}{% endblock %}
</body>
</html>
