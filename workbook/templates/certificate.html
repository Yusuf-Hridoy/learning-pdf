<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate of Completion</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Workbook styles -->
  <link rel="stylesheet" href="../styles/colors.css">
  <link rel="stylesheet" href="../styles/typography.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/print.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; }

    .page-certificate {
      page: certificate;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: calc(11in - 1in);
      border: 8px double var(--coral);
      border-radius: 24px;
      padding: 2rem;
      background: var(--white);
      position: relative;
    }
    .cert-ribbon {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      background: var(--sunny);
      border: 4px solid var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--navy);
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }
    .cert-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--coral);
      margin: 3rem 0 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cert-subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      color: var(--navy-muted);
      margin-bottom: 2rem;
    }
    .cert-name-line {
      width: 70%;
      border-bottom: 3px solid var(--navy);
      margin: 2rem auto 0.5rem;
      height: 2.5rem;
    }
    .cert-name-label {
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      color: var(--navy-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .cert-details {
      font-family: 'Nunito', sans-serif;
      margin-top: 2.5rem;
      font-size: 1rem;
      color: var(--navy-light);
    }
    .cert-seal {
      width: 100px;
      height: 100px;
      border: 3px dashed var(--gray-mid);
      border-radius: 50%;
      margin: 2rem auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--navy-muted);
    }
  </style>
</head>
<body>

  <div class="page-certificate">
    <div class="cert-ribbon">CS</div>
    <h1 class="cert-title">Certificate<br>of Completion</h1>
    <p class="cert-subtitle">This certifies that</p>
    <div class="cert-name-line"></div>
    <p class="cert-name-label">Student Name</p>
    <p class="cert-details">
      has successfully completed the<br>
      <strong>Unplugged Computer Science Workbook</strong><br>
      for ages 8-12
    </p>
    <div class="cert-seal">Seal Here</div>
  </div>

</body>
</html>
